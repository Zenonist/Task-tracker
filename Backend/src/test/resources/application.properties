# PostgreSQL driver class (should be H2 driver for test environment)
spring.datasource.driver-class-name=org.postgresql.Driver
# In-memory H2 database URL for testing with DB_CLOSE_ON_DELAY to keep DB open until JVM shutdown
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_ON_DELAY=-1
# Default H2 system administrator username
spring.datasource.username=sa
# Default H2 system administrator password
spring.datasource.password=sa

# Automatically create tables at startup and drop them when application stops (ideal for testing)
spring.jpa.hibernate.ddl-auto=create-drop
# Specify Hibernate dialect for H2 database to generate appropriate SQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect